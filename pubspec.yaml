name: wombo_combo
description: Una app de juegos para beber divertida

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Dependencias principales
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  confetti: ^0.7.0
  window_manager: ^0.3.3  
  
  animations: ^2.0.7
  flutter_animate: ^4.1.1
  vibration: ^1.7.5
  unity_ads_plugin: ^0.3.28
  app_tracking_transparency: ^2.0.6+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  
  assets:
    - lib/screens/caballos/barajaEsp/
    - lib/screens/ruleta/fichas/