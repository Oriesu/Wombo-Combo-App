# ==========================================
# WOMBO COMBO - iOS BUILD CORREGIDO
# ==========================================

workflows:
  build:
    name: "Wombo Combo - Build iOS"
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: "Codemagic CI"

    environment:
      flutter: 3.27.4
      xcode: 15.4
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.javiersanchez.womboCombo
      vars:
        BUILD_NAME: "1.4.4"
        BUILD_NUMBER: "23"

    cache:
      cache_paths:
        - ~/.pub-cache
        - ios/Pods

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: "0. Diagnóstico inicial"
        script: echo "🎯 SCRIPTS EJECUTÁNDOSE - $(date)"
      - name: "1. Limpieza"
        script: flutter clean
      - name: "2. Dependencias"
        script: flutter pub get
      - name: "3. CocoaPods"
        script: |
          cd ios
          pod install --repo-update
          cd ..
      - name: "4. Construir IPA"
        script: flutter build ipa --release --build-name=1.4.4 --build-number=23
      - name: "5. Verificar IPA"
        script: |
          echo "=== BUSCANDO IPA ==="
          find . -name "*.ipa"
          echo "==================="

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
      email:
        recipients:
          - javiersanchezmartinez2006@gmail.com
        notify:
          success: true
          failure: true
