workflows:
  ios-build:
    name: Wombo Combo - Build iOS
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic CI

    environment:
      flutter: 3.27.4
      xcode: 15.4
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.javiersanchez.womboCombo

    cache:
      cache_paths:
        - ~/.pub-cache
        - ios/Pods

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Clean
        script: flutter clean
      - name: Get dependencies
        script: flutter pub get
      - name: Pod install
        script: |
          cd ios
          pod install --repo-update
          cd ..
      - name: Build IPA
        script: flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        submit_to_testflight: true
        # No necesitas api_key, key_id, issuer_id aquí porque se heredan de integrations
      email:
        recipients:
          - javiersanchezmartinez2006@gmail.com
        notify:
          success: true
          failure: true
