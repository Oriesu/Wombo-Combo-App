workflows:
  ios-build:
    name: Wombo Combo - Build iOS
    instance_type: mac_mini_m2

    environment:
      flutter: 3.27.4
      xcode: 15.4
      cocoapods: default
      
      # Variables de entorno con los archivos codificados
      vars:
        CERTIFICATE_PASSWORD: "Jsuti.99"
        CERTIFICATE: ""
        PROVISIONING_PROFILE: ""

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.javiersanchez.womboCombo
        certificate: $CERTIFICATE
        certificate_password: $CERTIFICATE_PASSWORD
        provisioning_profile: $PROVISIONING_PROFILE

    cache:
      cache_paths:
        - ~/.pub-cache
        - ios/Pods

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Build iOS
        script: |
          flutter clean
          flutter pub get
          cd ios && pod install --repo-update && cd ..
          flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        submit_to_testflight: true
      email:
        recipients:
          - javiersanchezmartinez2006@gmail.com
        notify:
          success: true
          failure: true
