# ==========================================
# WOMBO COMBO - Flutter iOS Build
# CONFIGURACIÓN COMPLETA PARA TESTFLIGHT
# ==========================================

workflows:
  ios-build-and-upload:
    name: "Wombo Combo - Build & Upload to TestFlight"
    instance_type: mac_mini_m2

    # --- INTEGRACIÓN CON APP STORE CONNECT ---
    integrations:
      app_store_connect: "Codemagic CI"

    environment:
      flutter: 3.27.4
      xcode: 15.4
      cocoapods: default

      # --- CONFIGURACIÓN DE FIRMA AUTOMÁTICA ---
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.javiersanchez.womboCombo

      # --- VARIABLES DE ENTORNO ---
      vars:
        APP_IDENTIFIER: "com.javiersanchez.womboCombo"
        BUNDLE_ID: "com.javiersanchez.womboCombo"
        XCODE_SCHEME: "Runner"
        APP_NAME: "Wombo Combo"
        BUILD_NAME: "1.4.4"
        BUILD_NUMBER: "23"

    # --- CACHÉ PARA ACELERAR BUILDS ---
    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/Library/Caches/CocoaPods
        - ios/Pods
        - $HOME/Library/Developer/Xcode/DerivedData

    # --- TRIGGERS AUTOMÁTICOS ---
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
          source: true
      cancel_previous_builds: true

    # --- SCRIPTS DE CONSTRUCCIÓN ---
    scripts:
      # FASE 1: DIAGNÓSTICO INICIAL
      - name: "1. Diagnóstico del sistema"
        script: |
          echo "=========================================="
          echo "🚀 INICIANDO BUILD - WOMBO COMBO"
          echo "=========================================="
          echo "Fecha: $(date)"
          echo "Bundle ID: $BUNDLE_ID"
          echo "Versión: $BUILD_NAME ($BUILD_NUMBER)"
          echo ""
          echo "🔍 Versiones del sistema:"
          flutter --version
          echo ""
          xcodebuild -version
          echo ""
          echo "📁 Estructura del proyecto:"
          ls -la

      # FASE 2: LIMPIEZA
      - name: "2. Limpieza profunda"
        script: |
          echo "=========================================="
          echo "🧹 LIMPIEZA PROFUNDA"
          echo "=========================================="
          flutter clean
          rm -rf ios/Pods ios/Podfile.lock ios/Runner.xcworkspace
          rm -rf ~/Library/Developer/Xcode/DerivedData/*
          rm -rf build/
          echo "✅ Limpieza completada"

      # FASE 3: DEPENDENCIAS
      - name: "3. Instalar dependencias Flutter"
        script: |
          echo "=========================================="
          echo "📦 INSTALANDO DEPENDENCIAS"
          echo "=========================================="
          flutter pub get
          echo "✅ Dependencias instaladas"

      # FASE 4: COCOAPODS
      - name: "4. Configurar CocoaPods"
        script: |
          echo "=========================================="
          echo "🍏 CONFIGURANDO COCOAPODS"
          echo "=========================================="
          cd ios
          pod repo update
          pod install --verbose
          cd ..
          echo "✅ CocoaPods configurado"

      # FASE 5: VERIFICAR FIRMA
      - name: "5. Verificar certificados de firma"
        script: |
          echo "=========================================="
          echo "🔑 VERIFICANDO CERTIFICADOS"
          echo "=========================================="
          echo "Variables configuradas:"
          echo "KEY_ID: ${APP_STORE_CONNECT_KEY_IDENTIFIER:-NO CONFIGURADA}"
          echo "ISSUER_ID: ${APP_STORE_CONNECT_ISSUER_ID:-NO CONFIGURADA}"
          echo "PRIVATE_KEY: $(if [ -n "$APP_STORE_CONNECT_PRIVATE_KEY" ]; then echo "✅ CONFIGURADA"; else echo "❌ NO CONFIGURADA"; fi)"
          echo ""
          echo "Certificados disponibles:"
          security find-identity -v -p codesigning
          echo ""

      # FASE 6: APLICAR PERFILES
      - name: "6. Aplicar perfiles de firma"
        script: |
          echo "=========================================="
          echo "🔐 APLICANDO PERFILES DE FIRMA"
          echo "=========================================="
          xcode-project use-profiles
          echo "✅ Perfiles aplicados"

      # FASE 7: CONSTRUIR IPA
      - name: "7. Construir IPA (Release)"
        script: |
          echo "=========================================="
          echo "🔨 CONSTRUYENDO IPA"
          echo "=========================================="
          
          flutter build ipa --release \
            --build-name=$BUILD_NAME \
            --build-number=$BUILD_NUMBER
          
          if [ $? -eq 0 ]; then
            echo "✅ Build completado exitosamente"
          else
            echo "❌ Error en el build"
            exit 1
          fi

      # FASE 8: VERIFICAR IPA
      - name: "8. Verificar IPA generado"
        script: |
          echo "=========================================="
          echo "🔍 VERIFICANDO IPA"
          echo "=========================================="
          
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" -type f | head -1)
          
          if [ -n "$IPA_PATH" ] && [ -f "$IPA_PATH" ]; then
            IPA_SIZE=$(stat -f%z "$IPA_PATH" 2>/dev/null || stat -c%s "$IPA_PATH" 2>/dev/null)
            IPA_SIZE_MB=$((IPA_SIZE/1048576))
            
            echo "✅ IPA generado exitosamente"
            echo "📁 Ruta: $IPA_PATH"
            echo "📦 Tamaño: $IPA_SIZE_MB MB"
            ls -la "$IPA_PATH"
          else
            echo "❌ ERROR: No se encontró el archivo IPA"
            echo "Contenido de build/ios/ipa:"
            ls -la build/ios/ipa/ 2>/dev/null || echo "Carpeta no encontrada"
            exit 1
          fi

      # FASE 9: VALIDAR IPA (opcional)
      - name: "9. Validar IPA"
        script: |
          echo "=========================================="
          echo "✅ VALIDANDO IPA CON APPLE"
          echo "=========================================="
          
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" -type f | head -1)
          
          if [ -n "$IPA_PATH" ] && command -v xcrun &> /dev/null; then
            echo "Ejecutando validación..."
            xcrun altool --validate-app -f "$IPA_PATH" \
              -t ios \
              -u "$APPLE_ID" \
              -p "@env:APPLE_ID_PASSWORD" 2>/dev/null || echo "⚠️ Validación opcional fallida (puede ignorarse)"
          else
            echo "⚠️ Validación omitida"
          fi

    # --- ARTEFACTOS A GUARDAR ---
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/xcarchive/*.xcarchive
      - /tmp/xcodebuild_logs/*.log

    # --- PUBLICACIÓN ---
    publishing:
      # Subir a TestFlight
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true

      # Notificaciones por email
      email:
        recipients:
          - javiersanchezmartinez2006@gmail.com
        notify:
          success: true
          failure: true