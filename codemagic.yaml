workflows:
  ios-build:
    name: Wombo Combo Build
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic CI
    environment:
      flutter: 3.27.4
      xcode: 15.4
      cocoapods: default
      ios_signing:
        bundle_identifier: com.javiersanchez.womboCombo
        distribution_type: app_store
        team_id: K29552DY49
        create_profile: true
      vars:
        BUILD_NAME: 1.4.4
        BUILD_NUMBER: 23
    cache:
      cache_paths:
        - ~/.pub-cache
        - ios/Pods
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Diagnostico
        script: |
          echo "=== DIAGNOSTICO ==="
          echo "KEY_ID: ${APP_STORE_CONNECT_KEY_IDENTIFIER:-NO}"
          echo "ISSUER_ID: ${APP_STORE_CONNECT_ISSUER_ID:-NO}"
          if [ -n "$APP_STORE_CONNECT_PRIVATE_KEY" ]; then echo "PRIVATE_KEY: SI"; else echo "PRIVATE_KEY: NO"; fi
          security find-identity -v -p codesigning
          grep "PRODUCT_BUNDLE_IDENTIFIER" ios/Runner.xcodeproj/project.pbxproj | head -3
      - name: Limpieza
        script: |
          flutter clean
          rm -rf ios/Pods ios/Podfile.lock ios/Runner.xcworkspace
          rm -rf build/
      - name: Dependencias
        script: flutter pub get
      - name: CocoaPods
        script: |
          cd ios
          pod install --repo-update
          cd ..
      - name: Perfiles
        script: xcode-project use-profiles
      - name: Build IPA
        script: |
          flutter build ipa --release --build-name=1.4.4 --build-number=23
      - name: Buscar IPA
        script: |
          echo "=== BUSCANDO IPA ==="
          find . -name "*.ipa"
          echo "==================="
          ls -la build/ios/ipa/ 2>/dev/null || echo "No existe build/ios/ipa/"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
      email:
        recipients:
          - javiersanchezmartinez2006@gmail.com
        notify:
          success: true
          failure: true
