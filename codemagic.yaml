workflows:
  ios-build:
    name: Wombo Combo - Build iOS
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic CI

    environment:
      flutter: 3.27.4
      xcode: 15.4
      cocoapods: default
      
      # Usar el grupo secreto
      groups:
        - wombo_secrets

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.javiersanchez.womboCombo

    cache:
      cache_paths:
        - ~/.pub-cache
        - ios/Pods

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Build
        script: |
          flutter clean
          flutter pub get
          cd ios && pod install --repo-update && cd ..
          flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        submit_to_testflight: true
      email:
        recipients:
          - javiersanchezmartinez2006@gmail.com
        notify:
          success: true
          failure: true
