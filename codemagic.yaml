# ==========================================
# WOMBO COMBO - Flutter iOS Build
# ==========================================

workflows:
  ios-build-and-upload:
    name: "Wombo Combo - Build & Upload to TestFlight"
    instance_type: mac_mini_m2

    integrations:
      app_store_connect:
        auth_type: api_key
        api_key_id: 9S6XLVXFK6
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        private_key: $APP_STORE_CONNECT_PRIVATE_KEY

    environment:
      flutter: 3.27.4
      xcode: 15.4
      cocoapods: default

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.javiersanchez.womboCombo

      vars:
        APP_IDENTIFIER: "com.javiersanchez.womboCombo"
        BUNDLE_ID: "com.javiersanchez.womboCombo"
        XCODE_SCHEME: "Runner"
        APP_NAME: "Wombo Combo"
        BUILD_NAME: "1.4.4"
        BUILD_NUMBER: "23"

    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/Library/Caches/CocoaPods
        - ios/Pods
        - $HOME/Library/Developer/Xcode/DerivedData

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: "Install dependencies"
        script: |
          flutter clean
          flutter pub get
          
      - name: "Install CocoaPods"
        script: |
          cd ios
          pod install --repo-update
          cd ..
          
      - name: "Build IPA"
        script: |
          flutter build ipa --release \
            --build-name=$BUILD_NAME \
            --build-number=$BUILD_NUMBER

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        submit_to_testflight: true
      email:
        recipients:
          - javiersanchezmartinez2006@gmail.com
        notify:
          success: true
          failure: true