workflows:
  ios-build:
    name: Wombo Combo - Build iOS
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic CI

    environment:
      flutter: 3.27.4
      xcode: 15.4
      cocoapods: default
      
      # Las variables de entorno van dentro de vars
      vars:
        APP_STORE_CONNECT_KEY_IDENTIFIER: 499AH62NY3
        APP_STORE_CONNECT_ISSUER_ID: 65eeb72c-b971-49df-b0c4-20e809c00746
        APP_STORE_CONNECT_TEAM_ID: K29552DY49
        APP_STORE_CONNECT_PRIVATE_KEY: |
          -----BEGIN PRIVATE KEY-----
          MIGTAgEAMBMGByqGSM49AgEGCCqGSM49AwEHBHkwdwIBAQQgvb+RCUP44l5BvJtt
          uUgxCu5Dzwlh8wc8i68g2NGe7oOgCgYIKoZIzj0DAQehRANCAAT0rV6c11yb0XGk
          cAtrXbT76RexNTa0skS6Suhh9nLBvgo8jChP6JxnNRzWcqAAwUAEBaonfEIq8ZlQ
          w0j4j05j
          -----END PRIVATE KEY-----

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.javiersanchez.womboCombo
        # team_id NO va aquí - se detecta automáticamente

    cache:
      cache_paths:
        - ~/.pub-cache
        - ios/Pods

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Build
        script: |
          flutter clean
          flutter pub get
          cd ios && pod install --repo-update && cd ..
          xcode-project use-profiles
          flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
      email:
        recipients:
          - javiersanchezmartinez2006@gmail.com
        notify:
          success: true
          failure: true
